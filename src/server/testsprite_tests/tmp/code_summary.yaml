version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js 16
features:
  - name: Helper Function Test Endpoint
    description: Dev-only endpoint that exposes pure utility functions from google-cal.ts and todoist-task.ts for unit testing
    files:
      - app/api/test-helpers/route.ts
      - lib/google-cal.ts
      - lib/todoist-task.ts
    endpoints:
      - method: POST
        path: /api/test-helpers
        description: Invoke a named helper function with arguments and return the result
        auth_required: false
        request_schema:
          body:
            fn: string
            args: object
        response_schema:
          "200": "{result: any}"
          "400": "{error: string}"
known_limitations: []
